<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS AI — Memória Inteligente</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap');
  :root { --bg: #080A0F; --bg2: #0D1018; --surface: #181D28; --border: #252D40; --accent: #4F8EF7; --accent2: #7B5CF5; --text: #E8ECFF; --text2: #8892AA; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; }
  
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); }

  .ai-section { background: linear-gradient(180deg, var(--bg2), var(--bg)); padding: 15px 20px; border-bottom: 1px solid var(--border); }
  .ai-box { display: flex; gap: 8px; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); border-radius: 12px; padding: 8px 12px; }
  .ai-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 14px; }
  .ai-response { font-size: 13px; color: #1EDCA5; margin-top: 10px; padding: 10px; background: rgba(30,220,165,0.05); border-radius: 8px; display: none; border-left: 3px solid #1EDCA5; }

  .search-area { padding: 10px 20px; }
  .search-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
  .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text2); font-size: 14px; }

  .main { flex: 1; overflow-y: auto; padding: 10px 20px 100px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 12px; position: relative; }
  .card strong { color: var(--accent); display: block; margin-bottom: 5px; }
  .card img { width: 100%; border-radius: 10px; margin-top: 10px; }
  .file-badge { font-size: 11px; color: var(--accent2); background: #000; padding: 4px 8px; border-radius: 5px; margin-top: 5px; display: inline-block; }

  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.9); display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { width: 100%; background: var(--bg2); border-radius: 25px 25px 0 0; padding: 25px; }
  .btn-primary { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: bold; margin-top: 10px; }
  
  #apiKeyBtn { font-size: 10px; color: var(--text3); background: none; border: 1px solid var(--border); padding: 4px 8px; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <header class="topbar">
    <div class="logo">NEXUS AI</div>
    <div style="display:flex; gap:10px; align-items:center">
      <button id="apiKeyBtn" onclick="setApiKey()">Configurar IA</button>
      <button onclick="openM()" style="background:none; border:none; color:var(--accent); font-size:30px"><i class="ph ph-plus-circle"></i></button>
    </div>
  </header>

  <div class="ai-section">
    <div class="ai-box">
      <i class="ph ph-sparkle" style="color:var(--accent)"></i>
      <input type="text" id="aiQuery" placeholder="Pergunte qualquer coisa ao seu Nexus..." onkeypress="if(event.key=='Enter') askAI()">
      <button onclick="askAI()" style="background:none; border:none; color:var(--accent)"><i class="ph ph-paper-plane-right"></i></button>
    </div>
    <div id="aiResponse" class="ai-response"></div>
  </div>

  <div class="search-area">
    <div class="search-box">
      <i class="ph ph-magnifying-glass"></i>
      <input type="text" id="s" placeholder="Varredura manual..." onkeyup="render()">
    </div>
  </div>

  <main class="main" id="container"></main>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target==this) closeM()">
  <div class="modal">
    <input type="text" id="t" class="form-input" style="width:100%; padding:12px; margin-bottom:10px; background:var(--surface); border:1px solid var(--border); color:#fff; border-radius:8px" placeholder="Título">
    <textarea id="b" style="width:100%; padding:12px; margin-bottom:10px; background:var(--surface); border:1px solid var(--border); color:#fff; border-radius:8px" rows="3" placeholder="Nota rápida..."></textarea>
    <input type="file" id="fIn" style="display:none" onchange="hF(this)">
    <label for="fIn" style="display:block; padding:20px; border:2px dashed var(--border); text-align:center; margin-bottom:15px; border-radius:10px">
      <i class="ph ph-file-arrow-up"></i> <span id="fn">Anexar Arquivo/Foto</span>
    </label>
    <button class="btn-primary" onclick="save()">Salvar Memória</button>
  </div>
</div>

<script>
  let db = JSON.parse(localStorage.getItem('nexus_v5')) || [];
  let apiKey = localStorage.getItem('nexus_key') || '';
  let cF = null, cN = null;

  function setApiKey() {
    const key = prompt("Cole aqui sua API Key do Google Gemini:", apiKey);
    if(key) { localStorage.setItem('nexus_key', key); apiKey = key; alert("IA configurada!"); }
  }

  async function askAI() {
    const query = document.getElementById('aiQuery').value;
    const respDiv = document.getElementById('aiResponse');
    if(!apiKey) return alert("Configure a API Key primeiro!");
    if(!query) return;

    respDiv.style.display = 'block';
    respDiv.innerText = "Nexus está pensando...";

    // Prepara o contexto com seus dados
    const context = db.map(m => `Título: ${m.t}, Nota: ${m.b}`).join('\n');
    
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Você é o Nexus, o assistente pessoal de Edson. Com base nestes dados: \n${context}\n\n Responda à pergunta de Edson: ${query}` }] }]
        })
      });
      const data = await response.json();
      const aiText = data.candidates[0].content.parts[0].text;
      respDiv.innerText = aiText;
    } catch (e) {
      respDiv.innerText = "Erro ao conectar com a IA. Verifique sua chave.";
    }
  }

  function hF(i) {
    const f = i.files[0]; if(!f) return;
    cN = f.name; document.getElementById('fn').innerText = cN;
    const r = new FileReader(); r.onload = (e) => cF = e.target.result; r.readAsDataURL(f);
  }

  function save() {
    const t = document.getElementById('t').value;
    if(!t) return alert("Título!");
    db.push({ id: Date.now(), t, b: document.getElementById('b').value, f: cF, fn: cN, isI: cF && cF.startsWith('data:image') });
    localStorage.setItem('nexus_v5', JSON.stringify(db));
    closeM(); render();
    document.getElementById('t').value = ''; document.getElementById('b').value = ''; cF = null; document.getElementById('fn').innerText = "Anexar Arquivo/Foto";
  }

  function render() {
    const s = document.getElementById('s').value.toLowerCase();
    const c = document.getElementById('container');
    c.innerHTML = '';
    db.filter(m => m.t.toLowerCase().includes(s) || (m.b && m.b.toLowerCase().includes(s))).reverse().forEach(m => {
      const d = document.createElement('div');
      d.className = 'card';
      d.innerHTML = `<strong>${m.t}</strong><p style="font-size:13px; color:var(--text2)">${m.b}</p>
      ${m.isI ? `<img src="${m.f}">` : (m.f ? `<div class="file-badge">${m.fn}</div>` : '')}
      <div style="text-align:right"><button onclick="del(${m.id})" style="background:none; border:none; color:var(--danger); font-size:10px; margin-top:10px">EXCLUIR</button></div>`;
      c.appendChild(d);
    });
  }

  function del(id) { if(confirm("Apagar?")) { db = db.filter(x => x.id !== id); localStorage.setItem('nexus_v5', JSON.stringify(db)); render(); } }
  function openM() { document.getElementById('modal').classList.add('open'); }
  function closeM() { document.getElementById('modal').classList.remove('open'); }
  render();
</script>
</body>
</html>
