<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS PRO — Segurança Total</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&family=Space+Mono&display=swap');
  :root { --bg: #05070A; --bg2: #0A0D14; --surface: #121620; --border: #1F2533; --accent: #4F8EF7; --text: #E8ECFF; --danger: #F75F5F; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

  /* TELA DE BLOQUEIO */
  #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; }
  .lock-box { width: 100%; max-width: 300px; text-align: center; }
  .pass-input { width: 100%; padding: 15px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: #fff; text-align: center; font-size: 20px; letter-spacing: 5px; margin: 20px 0; outline: none; }
  
  /* APP INTERNO */
  #app { display: none; flex-direction: column; height: 100%; opacity: 0; transition: 0.5s; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); }

  .main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
  
  /* ESTILO DE EDIÇÃO DIRETA */
  .card-edit { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 20px; }
  .edit-title { background: none; border: none; color: var(--accent); font-weight: 700; font-size: 16px; width: 100%; margin-bottom: 10px; outline: none; }
  .edit-body { background: none; border: none; color: var(--text); font-size: 14px; width: 100%; resize: none; outline: none; line-height: 1.5; min-height: 60px; }
  .edit-meta { display: flex; gap: 10px; margin-top: 15px; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; }
  
  .badge { background: var(--bg); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; font-size: 11px; color: #8892AA; display: flex; align-items: center; gap: 5px; }
  .img-preview { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid var(--border); }

  .search-box { padding: 10px 20px; display: flex; gap: 10px; }
  .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; outline: none; }

  .btn-float { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: none; z-index: 99; }
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <i class="ph ph-fingerprint" style="font-size: 60px; color: var(--accent);"></i>
    <h2 style="margin-top: 15px; font-family: 'Syne';">NEXUS SECURE</h2>
    <p style="font-size: 12px; color: #555; margin-top: 5px;">Acesso restrito a Edson Rangel</p>
    <input type="password" id="masterPass" class="pass-input" placeholder="••••••••" oninput="checkPass(this.value)">
    <button onclick="tryBiometrics()" style="background:none; border:none; color:var(--accent); font-size:13px; font-weight:bold; cursor:pointer">Usar Biometria</button>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="logo">NEXUS PRO</div>
    <div style="display:flex; gap:15px">
      <i class="ph ph-shield-check" style="color:#1EDCA5"></i>
      <i class="ph ph-power" onclick="location.reload()" style="color:var(--danger)"></i>
    </div>
  </header>

  <div class="search-box">
    <input type="text" id="q" class="search-input" placeholder="Pesquisa profunda..." onkeyup="render()">
  </div>

  <main class="main" id="list"></main>
  
  <button class="btn-float" onclick="addNew()"><i class="ph ph-plus"></i></button>
</div>

<script>
  // Configurações de Segurança
  const MASTER_HASH = "33631050"; 
  const DB_KEY = "nexus_pro_v1";
  let db = JSON.parse(localStorage.getItem(DB_KEY)) || [];

  // 1. Controle de Acesso
  function checkPass(val) {
    if(val === MASTER_HASH) {
      unlockApp();
    }
  }

  async function tryBiometrics() {
    if (window.PublicKeyCredential) {
      // Simulação de chamada biométrica nativa (BiometricPrompt via WebAuthn)
      // Em um PWA real, isso acionaria o sensor do Android
      alert("Aguardando impressão digital...");
      // Nota: Para produção real, usaríamos navigator.credentials.get()
      // Fallback para facilitar seu teste agora:
      const p = prompt("Falha na biometria. Digite a Senha Master:");
      if(p === MASTER_HASH) unlockApp();
    } else {
      alert("Biometria não suportada neste navegador. Use a senha.");
    }
  }

  function unlockApp() {
    document.getElementById('lock-screen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('lock-screen').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'flex';
      setTimeout(() => app.style.opacity = '1', 50);
      render();
    }, 500);
  }

  // 2. Edição Direta e Salvamento Automático
  function render() {
    const q = document.getElementById('q').value.toLowerCase();
    const list = document.getElementById('list');
    list.innerHTML = '';

    db.filter(m => m.t.toLowerCase().includes(q) || m.b.toLowerCase().includes(q)).reverse().forEach(m => {
      const card = document.createElement('div');
      card.className = 'card-edit';
      card.innerHTML = `
        <input type="text" class="edit-title" value="${m.t}" oninput="update(${m.id}, 't', this.value)" placeholder="Título">
        <textarea class="edit-body" oninput="update(${m.id}, 'b', this.value)" placeholder="Conteúdo...">${m.b}</textarea>
        
        ${m.f ? (m.isI ? `<img src="${m.f}" class="img-preview">` : `<div class="badge"><i class="ph ph-file"></i> ${m.fn}</div>`) : ''}
        
        <div class="edit-meta">
          <div class="badge"><i class="ph ph-calendar"></i> ${m.date}</div>
          <div class="badge" onclick="removeFile(${m.id})" style="color:var(--danger)">Remover anexo</div>
          <div style="flex:1; text-align:right">
            <i class="ph ph-trash" onclick="del(${m.id})" style="color:var(--danger); font-size:18px"></i>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function update(id, field, value) {
    const item = db.find(x => x.id === id);
    if(item) {
      item[field] = value;
      item.lastEdit = new Date().toISOString();
      saveDB();
      // O salvamento automático acontece aqui a cada tecla
    }
  }

  function addNew() {
    const now = new Date();
    const newItem = {
      id: Date.now(),
      t: "",
      b: "",
      f: null,
      fn: null,
      isI: false,
      date: now.toLocaleDateString(),
      lastEdit: now.toISOString()
    };
    db.push(newItem);
    saveDB();
    render();
    // Foca no primeiro título da lista (o novo)
    setTimeout(() => document.querySelector('.edit-title').focus(), 100);
  }

  function del(id) {
    if(confirm("Excluir permanentemente?")) {
      db = db.filter(x => x.id !== id);
      saveDB();
      render();
    }
  }

  function removeFile(id) {
    const item = db.find(x => x.id === id);
    if(item) { item.f = null; item.fn = null; saveDB(); render(); }
  }

  function saveDB() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
  }

  // Bloqueio automático ao sair (opcional)
  window.onblur = () => {
    // console.log("Nexus Protegido");
  };

</script>
</body>
</html>
