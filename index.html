<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS — Memória Inteligente</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap');
  :root { --bg: #080A0F; --bg2: #0D1018; --surface: #181D28; --border: #252D40; --accent: #4F8EF7; --text: #E8ECFF; --text2: #8892AA; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100dvh; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100%; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); }
  .main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
  .card img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
  .file-badge { display: inline-block; background: #000; padding: 5px 10px; border-radius: 6px; font-size: 11px; color: var(--accent); margin-top: 8px; }
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { width: 100%; background: var(--bg2); border-radius: 25px 25px 0 0; padding: 25px; }
  .form-input, .form-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--text); margin-bottom: 12px; outline: none; }
  .upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; color: var(--text2); cursor: pointer; margin-bottom: 15px; display: block; }
  .btn-primary { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-weight: 800; }
</style>
</head>
<body>
<div id="app">
  <header class="topbar"><div class="logo">NEXUS</div><button onclick="openM()" style="background:none; border:none; color:var(--accent); font-size:30px"><i class="ph ph-plus-circle"></i></button></header>
  <main class="main"><div id="container"></div></main>
</div>
<div class="modal-overlay" id="modal" onclick="if(event.target==this) closeM()">
  <div class="modal">
    <input type="text" id="t" class="form-input" placeholder="Título">
    <textarea id="b" class="form-textarea" rows="3" placeholder="Nota..."></textarea>
    <label for="fIn" class="upload-area" id="upL"><i class="ph ph-image" style="font-size:24px"></i><br><span id="fn">Anexar Foto ou Arquivo</span></label>
    <input type="file" id="fIn" style="display:none" onchange="hF(this)">
    <button class="btn-primary" onclick="save()">Salvar Memória</button>
  </div>
</div>
<script>
  let db = JSON.parse(localStorage.getItem('nexus_v4')) || [];
  let cF = null, cN = null;
  function hF(i) {
    const f = i.files[0]; if(!f) return;
    if(f.size > 2 * 1024 * 1024) return alert("Arquivo muito grande (Máx 2MB)");
    cN = f.name; document.getElementById('fn').innerText = cN;
    const r = new FileReader(); r.onload = (e) => cF = e.target.result; r.readAsDataURL(f);
  }
  function save() {
    const t = document.getElementById('t').value; if(!t) return alert("Título obrigatório!");
    db.push({ id: Date.now(), t, b: document.getElementById('b').value, f: cF, fn: cN, isI: cF && cF.startsWith('data:image') });
    localStorage.setItem('nexus_v4', JSON.stringify(db));
    closeM(); render();
    document.getElementById('t').value = ''; document.getElementById('b').value = ''; cF = null; document.getElementById('fn').innerText = "Anexar Foto ou Arquivo";
  }
  function render() {
    const c = document.getElementById('container'); c.innerHTML = '';
    db.slice().reverse().forEach(m => {
      const d = document.createElement('div'); d.className = 'card';
      d.innerHTML = `<strong>${m.t}</strong><p style="font-size:13px; color:#8892AA; margin-top:5px">${m.b}</p>
      ${m.isI ? `<img src="${m.f}">` : (m.f ? `<div class="file-badge">${m.fn}</div>` : '')}
      <button onclick="del(${m.id})" style="color:#F75F5F; background:none; border:none; font-size:10px; margin-top:15px; font-weight:bold">APAGAR</button>`;
      c.appendChild(d);
    });
  }
  function del(id) { if(confirm("Apagar permanentemente?")) { db = db.filter(x => x.id !== id); localStorage.setItem('nexus_v4', JSON.stringify(db)); render(); } }
  function openM() { document.getElementById('modal').classList.add('open'); }
  function closeM() { document.getElementById('modal').classList.remove('open'); }
  render();
</script>
</body>
</html>
