<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS — Memória Inteligente</title>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');


  :root {
    --bg: #080A0F; --bg2: #0D1018; --bg3: #131720; --surface: #181D28; --surface2: #1E2433;
    --border: #252D40; --border2: #2E3A52; --accent: #4F8EF7; --accent2: #7B5CF5; --accent3: #1EDCA5;
    --accent-glow: rgba(79,142,247,0.15); --text: #E8ECFF; --text2: #8892AA; --text3: #4A5568;
    --danger: #F75F5F; --warn: #F7A64F; --success: #1EDCA5;
    --r: 10px; --r2: 16px; --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif; --body: 'DM Sans', sans-serif;
    --transition: 0.18s cubic-bezier(.4,0,.2,1);
  }


  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: var(--body); overflow: hidden; }
  #app { width: 100%; height: 100dvh; display: flex; flex-direction: column; position: relative; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--bg2); z-index: 10; }
  .logo { font-family: var(--display); font-weight: 800; font-size: 20px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .icon-btn { width: 36px; height: 36px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  .search-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 10px 14px; margin-bottom: 15px; }
  .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; margin-bottom: 10px; position: relative; }
  .card-title { font-family: var(--display); font-weight: 600; font-size: 14px; margin-bottom: 5px; color: var(--accent); }
  .card-body { font-size: 13px; color: var(--text2); line-height: 1.5; white-space: pre-wrap; }
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { width: 100%; background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px; }
  .form-group { margin-bottom: 15px; }
  .form-label { display: block; font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 5px; }
  .form-input, .form-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; color: var(--text); outline: none; }
  .btn-primary { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: var(--r2); color: #fff; font-weight: 700; }
  .delete-btn { color: var(--danger); font-size: 11px; margin-top: 10px; background: none; border: none; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo">NEXUS</div>
    <button class="icon-btn" onclick="openModal('addModal')"><i class="ph ph-plus"></i></button>
  </header>
  <main class="main">
    <div class="search-box"><i class="ph ph-magnifying-glass"></i><input type="text" id="searchInput" placeholder="Filtrar memórias..." onkeyup="render()"></div>
    <div id="container"></div>
  </main>
</div>


<div class="modal-overlay" id="addModal" onclick="if(event.target==this) closeModal()">
  <div class="modal">
    <h3 style="margin-bottom:15px">Nova Memória</h3>
    <div class="form-group">
      <label class="form-label">TÍTULO</label>
      <input type="text" id="t" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">CONTEÚDO</label>
      <textarea id="b" class="form-textarea" rows="4"></textarea>
    </div>
    <button class="btn-primary" onclick="add()">Salvar no Nexus</button>
  </div>
</div>


<script>
  let db = JSON.parse(localStorage.getItem('nexus_db')) || [];


  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const c = document.getElementById('container');
    c.innerHTML = '';
    db.filter(m => m.t.toLowerCase().includes(q) || m.b.toLowerCase().includes(q))
      .reverse().forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="card-title">${m.t}</div><div class="card-body">${m.b}</div>
        <button class="delete-btn" onclick="del(${m.id})">EXCLUIR</button>`;
        c.appendChild(div);
      });
  }


  function add() {
    const t = document.getElementById('t').value, b = document.getElementById('b').value;
    if(!t || !b) return;
    db.push({ id: Date.now(), t, b });
    localStorage.setItem('nexus_db', JSON.stringify(db));
    closeModal();
    render();
    document.getElementById('t').value = ''; document.getElementById('b').value = '';
  }


  function del(id) {
    if(confirm("Apagar?")) {
      db = db.filter(m => m.id !== id);
      localStorage.setItem('nexus_db', JSON.stringify(db));
      render();
    }
  }


  function openModal() { document.getElementById('addModal').classList.add('open'); }
  function closeModal() { document.getElementById('addModal').classList.remove('open'); }


  render();
</script>
</body>
</html>
